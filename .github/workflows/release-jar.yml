name: Release JAR

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload assembly JAR
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Build assembly JAR
        run: sbt -Dsbt.batch=true assembly

      - name: Prepare release asset
        run: |
          mkdir -p release-assets
          cp target/scala-3.8.3/app.jar "release-assets/cc-robots-download-spark-${GITHUB_REF_NAME}.jar"

      - name: Create release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.jar
